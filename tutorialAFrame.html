<html>

    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

    <script src="https://unpkg.com/aframe-event-set-component@4.2.1/dist/aframe-event-set-component.min.js"></script> <!-- needed for events like mousedown -->
    <script src="aframe-extras.loaders.js"></script> <!-- needed for animations of glb files, it gives us the `animation-mixer` component! -->
    <script src="https://unpkg.com/aframe-particle-system-component@1.0.x/dist/aframe-particle-system-component.min.js"></script> 

    <script>
      AFRAME.registerComponent('scale-on-mouseenter', {
        schema: {
          to: {default: '2.5 2.5 2.5', type: 'vec3'}
        },
    
        init: function () {
          var data = this.data;
          var el = this.el;
          this.el.addEventListener('mouseenter', function () {
            el.object3D.scale.copy(data.to);
          });
        }
      });
    </script>

  </head>
